name: Deploy to Vercel (paid account)

# Publica as duas variantes A/B na conta Vercel PAGA via token.
# A conta Vercel gratuita continua integrada ao GitHub normalmente — sem conflito.
# Gatilho: push na main (go-live) ou disparo manual (workflow_dispatch).

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Falha cedo e claro se o VERCEL_TOKEN não chegou (secret no lugar errado, etc).
      # Mostra só o TAMANHO do token, nunca o valor.
      - name: Check VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN veio VAZIO. Verifique: repo → Settings → Secrets and variables → Actions → aba 'Secrets' (NÃO 'Variables') → Repository secret com nome exato VERCEL_TOKEN."
            exit 1
          fi
          echo "✓ VERCEL_TOKEN presente (tamanho: ${#VERCEL_TOKEN} caracteres)."

      - name: Install Vercel CLI
        run: npm i -g vercel

      # Analytics: IDs vazios → guards em analytics.ts tratam como no-op (site funciona normal)
      # vercel link cria .vercel/project.json (necessário p/ vercel deploy sem --project).
      # rm -rf .vercel entre os deploys evita conflito de projeto.
      - name: Deploy Variante A
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_CLARITY_ID: ${{ secrets.VITE_CLARITY_ID }}
          VITE_GA4_ID: ${{ secrets.VITE_GA4_ID }}
        run: |
          vercel link --yes --project kanglu-landing --token "$VERCEL_TOKEN"
          vercel deploy --prod --yes \
            --token "$VERCEL_TOKEN" \
            --build-env VITE_VARIANT=A \
            --build-env "VITE_CLARITY_ID=${VITE_CLARITY_ID}" \
            --build-env "VITE_GA4_ID=${VITE_GA4_ID}"

      - name: Deploy Variante B
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_CLARITY_ID: ${{ secrets.VITE_CLARITY_ID }}
          VITE_GA4_ID: ${{ secrets.VITE_GA4_ID }}
        run: |
          rm -rf .vercel
          vercel link --yes --project kanglu-landing-b --token "$VERCEL_TOKEN"
          vercel deploy --prod --yes \
            --token "$VERCEL_TOKEN" \
            --build-env VITE_VARIANT=B \
            --build-env "VITE_CLARITY_ID=${VITE_CLARITY_ID}" \
            --build-env "VITE_GA4_ID=${VITE_GA4_ID}"
